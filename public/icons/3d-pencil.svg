<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pencilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0096D6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Corpo do lápis -->
  <rect x="18" y="15" width="8" height="60" rx="4" fill="url(#pencilGradient)"/>
  <!-- Madeira do lápis (topo) -->
  <polygon points="22,15 18,8 26,8" fill="#8B6F47"/>
  <!-- Ponta do lápis -->
  <polygon points="18,75 26,75 22,85" fill="#1A1A1A"/>
  <!-- Detalhes -->
  <rect x="19" y="25" width="6" height="20" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="19" y="50" width="6" height="15" rx="2" fill="rgba(255,255,255,0.15)"/>
</svg>
