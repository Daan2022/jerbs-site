version: "3.7"

services:
  landing-page:
    build: .
    # Substitua 'seu-usuario' pelo seu login do Docker Hub no Portainer (env var)
    image: systemdaan/escola-jerbs:latest
    container_name: escola-jerbs-app
    restart: always
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}

    # -----------------------------------------------------
    # INÍCIO DA ALTERAÇÃO
    # -----------------------------------------------------
    # Abrimos a porta 3000 diretamente para teste via IP
    ports:
      - "3000:3000"
    # -----------------------------------------------------
    # FIM DA ALTERAÇÃO
    # -----------------------------------------------------

    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        # Regra de Host corrigida para múltiplos domínios (padrão v2/v3)
        - "traefik.http.routers.escola-jerbs.rule=Host(`escolajerbs.com.br`) || Host(`www.escolajerbs.com.br`)"
        - "traefik.http.routers.escola-jerbs.entrypoints=websecure"
        - "traefik.http.routers.escola-jerbs.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.escola-jerbs.loadbalancer.server.port=3000"
        
        # Router adicional para capturar tráfego HTTP e evitar 404
        - "traefik.http.routers.escola-jerbs-http.rule=Host(`escolajerbs.com.br`) || Host(`www.escolajerbs.com.br`)"
        - "traefik.http.routers.escola-jerbs-http.entrypoints=web"
        - "traefik.http.routers.escola-jerbs-http.middlewares=redirect-to-https"
        
        # Middleware de redirecionamento global
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  network_public:
    external: true
    # ADICIONE A LINHA ABAIXO COM O NOME EXATO QUE VOCÊ COPIOU NO PASSO 1
    name: network_public
