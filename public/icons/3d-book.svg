<svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0096D6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Capa frontal do livro -->
  <rect x="25" y="30" width="60" height="70" rx="4" fill="url(#bookGradient)"/>
  <!-- Capa traseira (ligeiramente deslocada) -->
  <rect x="30" y="35" width="60" height="70" rx="4" fill="#001F5C" opacity="0.5"/>
  <!-- Lombada -->
  <rect x="28" y="30" width="4" height="70" rx="2" fill="#001F5C"/>
  <!-- Linhas do livro -->
  <line x1="35" y1="45" x2="80" y2="45" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="55" x2="80" y2="55" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="65" x2="75" y2="65" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
